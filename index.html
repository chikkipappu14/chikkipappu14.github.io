<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Be My Valentine 💕</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- Floating hearts background -->
    <div class="hearts-container" id="heartsContainer"></div>

    <!-- Main container -->
    <div class="main-container">
        <!-- Header -->
        <header class="header">
            <h1 class="title">
                Be My <span class="highlight">Valentine</span>
            </h1>
        </header>

        <!-- Main card -->
        <div class="card" id="mainCard">
            <div class="card-content">
                <h2 class="message" id="message"></h2>
                <p class="subtitle" id="subtitle"></p>
                <div class="image-container">
                    <img src="us.jpg" alt="Us together" class="main-image" id="mainImage">
                    <div class="heart-float">💕</div>
                </div>
            </div>
        </div>

        <!-- Interactive buttons -->
        <div class="button-container">
            <button class="btn btn-yes" id="yesBtn">Yes! 💖</button>
            <button class="btn btn-no" id="noBtn">No</button>
        </div>

        <!-- Background music -->
        <audio id="bgMusic" loop>
            <source src="Perfect.flac" type="audio/flac">
        </audio>

        <!-- Footer -->
        <footer class="footer">
            <p style="color: rgba(255, 255, 255, 0.8); font-size: 0.9rem;">
                Made with ❤️ for my Valentine
            </p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>

</html>
